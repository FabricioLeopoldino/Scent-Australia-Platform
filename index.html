<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scent Australia Platform</title>
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter/Archivo (shell + SA) · Playfair/JetBrains Mono (SM editorial design) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // ONE platform-wide theme key ('platform_theme'); default dark.
      // Legacy keys ('theme' from SA, 'sm_theme' from SM) are migrated once —
      // two modules on one document must share a single preference.
      try {
        var t = localStorage.getItem('platform_theme');
        if (!t) {
          t = localStorage.getItem('theme') || localStorage.getItem('sm_theme') || 'dark';
          localStorage.setItem('platform_theme', t);
          localStorage.removeItem('theme');
          localStorage.removeItem('sm_theme');
        }
        if (t === 'light') document.documentElement.classList.remove('dark');
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
